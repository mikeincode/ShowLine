kind = "mobile"
previewPath = "/"
title = "ShowLine"
version = "1.0.0"
id = "artifacts/showline"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19267

[services.development]
run = "pnpm --filter @workspace/showline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/showline", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/showline", "run", "serve" ]

[services.env]
PORT = "19267"
BASE_PATH = "/"
